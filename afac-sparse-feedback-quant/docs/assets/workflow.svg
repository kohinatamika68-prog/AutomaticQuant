<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Sparse Feedback Quant workflow dashboard</title>
  <desc id="desc">A premium dashboard-style workflow showing validation, scoring, correlation clustering, selection, and research memory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.45" stop-color="#10243a"/>
      <stop offset="1" stop-color="#112d34"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17243a"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#63e6be"/>
      <stop offset="1" stop-color="#2f855a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbd38d"/>
      <stop offset="1" stop-color="#b7791f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".35"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#80a7c5"/>
    </marker>
    <style>
      .panel { fill: url(#card); stroke: #2d4965; stroke-width: 1.2; rx: 22; filter: url(#shadow); }
      .soft { fill: rgba(255,255,255,.05); stroke: rgba(255,255,255,.12); }
      .title { fill: #f8fafc; font-family: "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 800; }
      .subtitle { fill: #a8c3d9; font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; }
      .label { fill: #f8fafc; font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 750; }
      .sub { fill: #aac0d2; font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; }
      .mono { fill: #dbeafe; font-family: Consolas, "SFMono-Regular", monospace; font-size: 12px; }
      .arrow { stroke: #80a7c5; stroke-width: 2.3; fill: none; marker-end: url(#arrowhead); opacity: .9; }
      .chip { fill: #0f2033; stroke: #2d4965; }
      .grid { stroke: #264156; stroke-width: .8; opacity: .45; }
    </style>
  </defs>
  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <g opacity=".5">
    <path class="grid" d="M80 84 H1120 M80 134 H1120 M80 184 H1120 M80 234 H1120 M80 284 H1120 M80 334 H1120 M80 384 H1120 M80 434 H1120"/>
    <path class="grid" d="M120 70 V456 M220 70 V456 M320 70 V456 M420 70 V456 M520 70 V456 M620 70 V456 M720 70 V456 M820 70 V456 M920 70 V456 M1020 70 V456"/>
  </g>

  <text class="title" x="70" y="60">Sparse Feedback Quant</text>
  <text class="subtitle" x="70" y="86">A research loop for delayed feedback, candidate scoring, de-duplication, and reviewable memory</text>

  <g transform="translate(70 126)">
    <rect class="panel" x="0" y="0" width="190" height="138"/>
    <circle cx="34" cy="36" r="18" fill="url(#blue)"/>
    <text class="label" x="66" y="41">Validate</text>
    <text class="sub" x="24" y="74">JSON schema</text>
    <text class="sub" x="24" y="94">state transitions</text>
    <rect class="chip" x="24" y="108" width="122" height="22" rx="11"/>
    <text class="mono" x="40" y="123">validate OK</text>
  </g>
  <path class="arrow" d="M268 195 L330 195"/>

  <g transform="translate(340 126)">
    <rect class="panel" x="0" y="0" width="190" height="138"/>
    <circle cx="34" cy="36" r="18" fill="url(#green)"/>
    <text class="label" x="66" y="41">Score</text>
    <text class="sub" x="24" y="74">sharpe-like</text>
    <text class="sub" x="24" y="94">drawdown + hit-rate</text>
    <path d="M24 120 C54 94, 78 126, 104 102 S150 108, 166 82" stroke="#63e6be" stroke-width="3" fill="none"/>
  </g>
  <path class="arrow" d="M538 195 L600 195"/>

  <g transform="translate(610 126)">
    <rect class="panel" x="0" y="0" width="190" height="138"/>
    <circle cx="34" cy="36" r="18" fill="url(#gold)"/>
    <text class="label" x="66" y="41">Cluster</text>
    <text class="sub" x="24" y="74">daily-return corr</text>
    <text class="sub" x="24" y="94">critical / high / medium</text>
    <circle cx="62" cy="120" r="13" fill="#fbd38d"/>
    <circle cx="108" cy="120" r="13" fill="#f56565"/>
    <line x1="75" y1="120" x2="95" y2="120" stroke="#f56565" stroke-width="4"/>
  </g>
  <path class="arrow" d="M808 195 L870 195"/>

  <g transform="translate(880 126)">
    <rect class="panel" x="0" y="0" width="250" height="138"/>
    <circle cx="34" cy="36" r="18" fill="url(#green)"/>
    <text class="label" x="66" y="41">Select + Learn</text>
    <text class="sub" x="24" y="74">representative candidates</text>
    <text class="sub" x="24" y="94">review queue</text>
    <text class="sub" x="24" y="114">Markdown / JSON memory</text>
  </g>

  <g transform="translate(70 328)">
    <rect class="soft" x="0" y="0" width="1060" height="98" rx="18"/>
    <text class="label" x="28" y="36">CLI pipeline</text>
    <text class="mono" x="28" y="66">validate → report --format json → corr --matrix → score --top 3 → research note</text>
    <rect x="760" y="26" width="250" height="48" rx="16" fill="#0f2033" stroke="#2d4965"/>
    <text class="mono" x="790" y="56">selected | review | metrics</text>
  </g>
</svg>
